# CI — test, build, SHACL-validate, export on every push/PR.
# Pages deploy below is a minimal stand-in (dist/graph.html as index.html);
# the full Astro site replaces it in M5 without changing this deploy mechanism.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true          # caches uv's download cache between runs

      # --locked: use uv.lock exactly; fail instead of re-resolving if it's stale.
      - run: uv sync --locked

      # WeasyPrint (PDF export) links against Pango/Cairo at runtime — not a pip
      # wheel. ubuntu-latest doesn't guarantee them, so install explicitly; the
      # résumé HTML has no raster images, so Pango+PangoFT2 is the full set.
      - run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - run: make all

      # Built graph + derived exports, downloadable per run for inspection.
      - uses: actions/upload-artifact@v4
        with:
          name: graph-and-exports
          path: |
            dist/graph.ttl
            dist/graph.jsonld
            dist/graph.html
            dist/resume.pdf
            dist/resume.json

      # graph.html is the landing page; other exports stay reachable by path
      # (e.g. /resume.pdf) since the whole dist/ dir is uploaded below.
      - run: cp dist/graph.html dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    needs: build-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
