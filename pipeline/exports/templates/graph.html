<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>resume-graph — knowledge graph</title>
<style>
  :root {
    --bg:#0b111b; --surface:#0f1620; --panel:#131c28; --line:#1e2a3a;
    --ink:#e6edf6; --muted:#8b9bb2; --faint:#5b6b82; --accent:#3987e5;
    --sbw:216px;
    --mono:"IBM Plex Mono",ui-monospace,"Cascadia Code","SF Mono",Menlo,monospace;
    --sans:"Space Grotesk",system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:var(--sans); overflow:hidden; }
  /* The stage starts where the sidebar ends, so the canvas' own width is the
     drawable width — no offset math in toScreen/pick. */
  #stage { position:fixed; inset:0 0 0 var(--sbw); }
  canvas { display:block; width:100%; height:100%; touch-action:none; cursor:grab; }
  canvas.grabbing { cursor:grabbing; }

  /* left sidebar: wordmark + node-type filter (doubles as the legend) */
  #sidebar { position:fixed; top:0; left:0; bottom:0; width:var(--sbw); z-index:7;
    background:var(--surface); border-right:1px solid var(--line);
    display:flex; flex-direction:column; overflow-y:auto; }
  #sidebar .sb-head { padding:14px 16px 12px; border-bottom:1px solid var(--line); }
  #sidebar h1 { font-size:13px; letter-spacing:.14em; text-transform:uppercase;
    margin:0; color:var(--muted); font-weight:600; }
  #sidebar h1 b { color:var(--ink); font-weight:700; }
  .sb-sec { padding:14px 16px; }
  .sb-t { font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--faint); margin-bottom:9px; display:flex; justify-content:space-between;
    align-items:baseline; }
  .sb-t button { background:none; border:none; color:var(--accent); cursor:pointer;
    font-family:var(--mono); font-size:10px; letter-spacing:.06em; padding:0; }
  .lg-row { display:flex; align-items:center; gap:8px; font-size:12px; padding:4px 0;
    cursor:pointer; color:var(--muted); font-family:var(--mono); user-select:none; }
  .lg-row:hover { color:var(--ink); }
  .lg-row.off { opacity:.35; text-decoration:line-through; }
  .lg-dot { width:11px; height:11px; border-radius:50%; flex:0 0 auto; }
  .lg-n { margin-left:auto; color:var(--faint); font-size:10px; }
  /* date window: single-select, so a ring/dot radio rather than the strike-through
     the multi-select type rows use */
  .dt-row .dt-mark { width:11px; height:11px; border-radius:50%; flex:0 0 auto;
    border:1px solid var(--faint); }
  .dt-row.on { color:var(--ink); }
  .dt-row.on .dt-mark { border-color:var(--accent); background:var(--accent);
    box-shadow:inset 0 0 0 2px var(--surface); }
  /* size key: node radius encodes rg:level within the Skill hue. Doubles as a
     multi-select filter, so each step is a full-width cell — the dots sit on a
     shared baseline inside a fixed-height box so the rising scale still reads. */
  .sz-key { display:flex; padding:2px 0 0; }
  .sz-cell { flex:1 1 0; display:flex; flex-direction:column; align-items:center;
    gap:5px; padding:2px 0; cursor:pointer; user-select:none; }
  .sz-dot { height:15px; display:flex; align-items:flex-end; }
  .sz-dot i { display:block; border-radius:50%; background:#199e70; }
  .sz-lab { font-family:var(--mono); font-size:9px; color:var(--faint); }
  .sz-cell:hover .sz-lab { color:var(--ink); }
  .sz-cell.off .sz-dot i { background:transparent; box-shadow:inset 0 0 0 1px var(--faint); }
  .sz-cell.off .sz-lab { opacity:.5; text-decoration:line-through; }
  #sb-toggle { display:none; }

  /* top bar (sits to the right of the sidebar) */
  #bar { position:fixed; top:0; left:var(--sbw); right:0; display:flex; gap:12px;
    align-items:center; padding:10px 14px; z-index:5;
    background:linear-gradient(180deg,rgba(11,17,27,.92),rgba(11,17,27,0)); }
  #search { margin-left:auto; background:var(--surface); border:1px solid var(--line);
    color:var(--ink); font-family:var(--mono); font-size:12px; padding:6px 10px;
    border-radius:7px; width:200px; }
  #search::placeholder { color:var(--faint); }
  .btn { background:var(--surface); border:1px solid var(--line); color:var(--muted);
    font-family:var(--mono); font-size:11px; padding:6px 10px; border-radius:7px;
    cursor:pointer; }
  .btn:hover { color:var(--ink); border-color:var(--accent); }

  /* detail panel */
  #panel { position:fixed; top:0; right:0; bottom:0; width:340px; z-index:8;
    background:var(--panel); border-left:1px solid var(--line); padding:0;
    transform:translateX(100%); transition:transform .22s ease; overflow-y:auto; }
  #panel.open { transform:translateX(0); }
  @media (prefers-reduced-motion:reduce){ #panel{ transition:none; } }
  #panel .p-head { padding:18px 18px 12px; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--panel); }
  #panel .p-type { font-family:var(--mono); font-size:11px; letter-spacing:.1em;
    text-transform:uppercase; display:inline-flex; align-items:center; gap:7px; }
  #panel .p-type .lg-dot { width:9px; height:9px; }
  #panel h2 { margin:9px 0 0; font-size:19px; line-height:1.25; }
  #panel .p-close { position:absolute; top:14px; right:14px; background:none; border:none;
    color:var(--muted); font-size:20px; cursor:pointer; line-height:1; }
  #panel .p-close:hover { color:var(--ink); }
  #panel .p-body { padding:14px 18px 40px; }
  .kv { margin:0 0 12px; }
  .kv .k { font-family:var(--mono); font-size:10px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--faint); margin-bottom:3px; }
  .kv .v { font-size:13.5px; line-height:1.5; color:var(--ink); }

  /* skill level: four rising segments — ordinal scale read at a glance */
  .lvl { display:flex; align-items:flex-end; gap:4px; height:22px; margin-top:2px; }
  .lvl i { flex:1; background:var(--line); border-radius:2px 2px 0 0; }
  .lvl i.on { background:var(--accent); }
  .lvl i:nth-child(1){ height:25%; } .lvl i:nth-child(2){ height:50%; }
  .lvl i:nth-child(3){ height:75%; } .lvl i:nth-child(4){ height:100%; }
  .lvl-cap { display:flex; justify-content:space-between; font-family:var(--mono);
    font-size:9.5px; color:var(--faint); margin-top:4px; }
  .lvl-cap b { color:var(--ink); font-weight:600; }

  .rel-group { margin-top:14px; }
  .rel-group .rg-t { font-family:var(--mono); font-size:10px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--faint); margin-bottom:6px;
    display:flex; justify-content:space-between; }
  .chip { display:inline-flex; align-items:center; gap:6px; font-size:12px;
    background:var(--surface); border:1px solid var(--line); color:var(--ink);
    padding:3px 9px; border-radius:20px; margin:0 5px 5px 0; cursor:pointer;
    font-family:var(--mono); }
  .chip:hover { border-color:var(--accent); }
  .chip .lg-dot { width:8px; height:8px; }
  ul.prose { margin:6px 0 0; padding-left:16px; }
  ul.prose li { font-size:12.5px; line-height:1.45; color:var(--muted); margin:4px 0; }
  #hint { position:fixed; right:14px; bottom:14px; z-index:4; color:var(--faint);
    font-family:var(--mono); font-size:11px; text-align:right; pointer-events:none; }

  /* narrow: sidebar collapses to an overlay drawer, stage reclaims full width */
  @media (max-width:720px) {
    #stage { left:0; }
    #bar { left:0; }
    #sidebar { transform:translateX(-100%); transition:transform .2s ease; }
    #sidebar.open { transform:translateX(0); }
    #sb-toggle { display:inline-block; }
    #hint { display:none; }
  }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>
<nav id="sidebar">
  <div class="sb-head"><h1><b>resume</b>-graph</h1></div>
  <div class="sb-sec">
    <div class="sb-t"><span>Node type</span><button id="lg-all">all</button></div>
    <div id="lg-rows"></div>
  </div>
  <div class="sb-sec">
    <div class="sb-t"><span>Last active</span></div>
    <div id="dt-rows"></div>
  </div>
  <div class="sb-sec">
    <div class="sb-t"><span>Skill level</span><button id="sz-all">all</button></div>
    <div class="sz-key" id="sz-key"></div>
  </div>
</nav>
<div id="bar">
  <button class="btn" id="sb-toggle" title="Toggle filters">filters</button>
  <button class="btn" id="reset-btn" title="Re-run layout &amp; recenter">reset</button>
  <input id="search" placeholder="search nodes…" autocomplete="off">
</div>
<aside id="panel"><div class="p-head"><button class="p-close" id="p-close">×</button>
  <span class="p-type" id="p-type"></span><h2 id="p-title"></h2></div>
  <div class="p-body" id="p-body"></div></aside>
<div id="hint">scroll = zoom · drag = pan / move node · click = inspect</div>

<script id="data" type="application/json">/*__DATA__*/null</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById("data").textContent);
const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// ---- model ---------------------------------------------------------------
const byId = new Map();
DATA.nodes.forEach(n => {
  n.x = (Math.random()-.5)*600; n.y = (Math.random()-.5)*600;
  n.vx = 0; n.vy = 0; n.deg = 0; byId.set(n.id, n);
});
const links = DATA.links.filter(l => byId.has(l.source) && byId.has(l.target))
  .map(l => ({ s: byId.get(l.source), t: byId.get(l.target), kind: l.kind }));
links.forEach(l => { l.s.deg++; l.t.deg++; });
// adjacency for highlight + panel
const adj = new Map();
DATA.nodes.forEach(n => adj.set(n.id, []));
links.forEach(l => { adj.get(l.s.id).push({ o:l.t, kind:l.kind, dir:"out" });
                     adj.get(l.t.id).push({ o:l.s, kind:l.kind, dir:"in" }); });
const typeColor = Object.fromEntries(DATA.types.map(t => [t.type, t.color]));
const hidden = new Set();          // hidden by node type (multi-select)
const dateHidden = new Set();      // hidden by the "last active" window (single-select)
const hiddenLevels = new Set();    // hidden by rg:level (multi-select, skills only)
// An unknown/absent level maps to "unrated" — the bucket it is already drawn at,
// so nothing can slip past every level toggle.
const LEVEL_KEYS = new Set(DATA.levels.map(l => l.level));
function levelOf(n){ const v=String(n.attrs.level||"").trim().toLowerCase();
  return LEVEL_KEYS.has(v) ? v : "unrated"; }
function lvlHidden(n){ return n.type==="Skill" && hiddenLevels.has(levelOf(n)); }
function vis(n){ return !hidden.has(n.type) && !dateHidden.has(n.id) && !lvlHidden(n); }

// ---- date window ---------------------------------------------------------
// `n.last` is a decimal year baked in at build time; `n.ongoing` marks a still-
// current role, resolved against the VIEWER's clock — so the build output stays
// byte-stable while "last 6 years" keeps meaning six years from today.
// Narrowest first: the recent window is the one a reader reaches for, and "all"
// reads as the escape hatch at the bottom rather than the head of the list.
const WINDOWS = [{label:"last 6y", years:6}, {label:"last 12y", years:12},
                 {label:"all", years:null}];
const NOW = new Date().getFullYear() + new Date().getMonth()/12;
let windowYears = null;

// Recomputes every non-type filter. Called by the type and level toggles too:
// the empty-category cascade below reads vis(), so it depends on all three.
function applyDateFilter(){
  dateHidden.clear();
  if (windowYears != null){
    const cut = NOW - windowYears;
    for (const n of DATA.nodes){
      if (n.type==="Person" || n.type==="Category") continue;  // undated hubs, exempt
      const at = n.ongoing ? NOW : n.last;
      // undated here means unevidenced (a skill stub) — no date to be inside
      // the window, so it drops out rather than floating free of the filter.
      if (at == null || at < cut) dateHidden.add(n.id);
    }
  }
  // A category hub whose skills all dropped out is noise, whichever filter took
  // them. Run to a fixed point rather than in one pass: categories nest
  // (cloud-aws broader cloud), so a parent checked before its child would see a
  // child that is about to die and survive on it. 9 hubs, so iterating is free.
  // NOT the deferred cascading multi-select browser — no user selection here.
  for (let changed=true; changed; ){
    changed=false;
    for (const n of DATA.nodes){
      if (n.type!=="Category" || dateHidden.has(n.id)) continue;
      // inbound broader = the things filed under this hub (skills or sub-hubs)
      const alive = adj.get(n.id).some(e => e.kind==="broader" && e.dir==="in" && vis(e.o));
      if (!alive){ dateHidden.add(n.id); changed=true; }
    }
  }
  if (selected && !vis(selected)) select(null);
  refreshCounts();
}

// ---- force layout --------------------------------------------------------
// Plain O(n²) Verlet-ish sim: repulsion + link springs + gravity to origin.
// n≈170 so the quadratic loop is trivial; no quadtree needed.
const REST = { broader:55, usedSkill:80, evidencedBy:95, default:70 };
let alpha = 1;
function tick() {
  const nodes = DATA.nodes;
  // repulsion (charge scales with node size so hubs clear space)
  for (let i=0;i<nodes.length;i++){ const a=nodes[i];
    for (let j=i+1;j<nodes.length;j++){ const b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy||.01;
      if (d2>90000) continue;                 // ignore far pairs (perf + looseness)
      const d=Math.sqrt(d2);
      const f=(220*(a.size+b.size)/6)/d2;
      const fx=dx/d*f, fy=dy/d*f;
      a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
    }
  }
  // springs
  for (const l of links){ const a=l.s, b=l.t;
    let dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||.01;
    const rest=REST[l.kind]||REST.default;
    const f=(d-rest)*0.02;
    const fx=dx/d*f, fy=dy/d*f;
    a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
  }
  // gravity + integrate
  for (const n of nodes){
    if (n===dragged) continue;
    n.vx-=n.x*0.0016; n.vy-=n.y*0.0016;
    n.vx*=0.86; n.vy*=0.86;
    n.x+=n.vx*alpha; n.y+=n.vy*alpha;
  }
  alpha=Math.max(alpha*0.995, 0.02);
}

// ---- canvas / camera -----------------------------------------------------
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W=0, H=0, DPR=Math.min(window.devicePixelRatio||1, 2);
const cam = { x:0, y:0, k:1 };
function resize(){ W=canvas.clientWidth; H=canvas.clientHeight;
  canvas.width=W*DPR; canvas.height=H*DPR; }
window.addEventListener("resize", resize); resize();
// center camera initially
cam.x = 0; cam.y = 0; cam.k = 0.9;
function toScreen(p){ return { x:(p.x-cam.x)*cam.k+W/2, y:(p.y-cam.y)*cam.k+H/2 }; }
function toWorld(sx,sy){ return { x:(sx-W/2)/cam.k+cam.x, y:(sy-H/2)/cam.k+cam.y }; }

let selected=null, hover=null;
function neighborsOf(n){ return n ? new Set(adj.get(n.id).map(e=>e.o.id)) : null; }

function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  const focus = selected || hover;
  const near = neighborsOf(focus);

  // edges
  ctx.lineWidth = 1;
  for (const l of links){
    if (!vis(l.s)||!vis(l.t)) continue;
    const a=toScreen(l.s), b=toScreen(l.t);
    const lit = focus && (l.s===focus||l.t===focus);
    const broad = l.kind==="broader";
    let stroke;
    if (lit) stroke = "rgba(160,190,230,.6)";
    else if (broad) stroke = `rgba(230,103,103,${focus?0.10:0.22})`;
    else stroke = `rgba(120,140,170,${focus?0.05:0.10})`;
    ctx.strokeStyle = stroke;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  // nodes (small→large so hubs draw on top)
  const order=[...DATA.nodes].sort((p,q)=>p.size-q.size);
  ctx.font = "12px "+getComputedStyle(document.body).getPropertyValue("--mono");
  ctx.textAlign="center"; ctx.textBaseline="middle";
  for (const n of order){
    if (!vis(n)) continue;
    const s=toScreen(n); const r=(n.size+ (n.deg>8?2:0))*Math.max(cam.k,.55);
    const isNear = !focus || n===focus || (near&&near.has(n.id));
    ctx.globalAlpha = isNear ? 1 : 0.14;
    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,6.2832);
    ctx.fillStyle=n.color; ctx.fill();
    if (n===selected){ ctx.lineWidth=2.5; ctx.strokeStyle="#e6edf6"; ctx.stroke(); }
    // labels: hubs always; others when zoomed-in or focused/near
    const showLabel = n.type==="Category"||n.type==="Person"||
      (cam.k>1.15 && n.size>=8) || (focus && isNear);
    if (showLabel && isNear){
      ctx.globalAlpha = 1;
      ctx.fillStyle = "rgba(230,237,246,.92)";
      ctx.fillText(n.label, s.x, s.y - r - 8);
    }
  }
  ctx.globalAlpha=1;
}

// ---- main loop -----------------------------------------------------------
function frame(){ if(alpha>0.021||dragged) tick(); draw(); raf=requestAnimationFrame(frame); }
let raf;
// First load settles off-screen: the first paint is the final layout, no bounce.
// alpha parks below frame()'s tick threshold, so the sim is cold but still live —
// pointerdown re-heats it for dragging, reset re-runs it hot (animated, opt-in).
// REDUCED keeps its draw-only loop: never ticks, not even on drag.
function run(){
  for(let i=0;i<400;i++) tick();
  alpha=0.02;
  if (REDUCED) (function loop(){ draw(); raf=requestAnimationFrame(loop); })();
  else frame();
}

// ---- interaction ---------------------------------------------------------
let dragged=null, panning=false, moved=false, last={x:0,y:0}, downNode=null;
function pick(sx,sy){
  let best=null, bestD=Infinity;
  for (const n of DATA.nodes){ if(!vis(n)) continue;
    const s=toScreen(n); const r=(n.size+2)*Math.max(cam.k,.55)+4;
    const d=(s.x-sx)**2+(s.y-sy)**2;
    if (d<r*r && d<bestD){ best=n; bestD=d; } }
  return best;
}
canvas.addEventListener("pointerdown", e=>{
  canvas.setPointerCapture(e.pointerId); moved=false; last={x:e.clientX,y:e.clientY};
  const n=pick(e.offsetX,e.offsetY); downNode=n;
  if(n){ dragged=n; alpha=Math.max(alpha,.5); } else { panning=true; canvas.classList.add("grabbing"); }
});
canvas.addEventListener("pointermove", e=>{
  if(Math.abs(e.clientX-last.x)+Math.abs(e.clientY-last.y)>3) moved=true;
  if(dragged){ const w=toWorld(e.offsetX,e.offsetY); dragged.x=w.x; dragged.y=w.y; dragged.vx=0; dragged.vy=0; }
  else if(panning){ cam.x-=(e.clientX-last.x)/cam.k; cam.y-=(e.clientY-last.y)/cam.k; last={x:e.clientX,y:e.clientY}; }
  else { const n=pick(e.offsetX,e.offsetY); if(n!==hover){ hover=n; canvas.style.cursor=n?"pointer":"grab"; } }
});
canvas.addEventListener("pointerup", e=>{
  if(!moved && downNode) select(downNode);
  else if(!moved && !downNode) select(null);
  dragged=null; panning=false; canvas.classList.remove("grabbing");
});
canvas.addEventListener("wheel", e=>{
  e.preventDefault();
  const w=toWorld(e.offsetX,e.offsetY);
  cam.k=Math.min(4, Math.max(.25, cam.k*(e.deltaY<0?1.12:0.89)));
  const w2=toWorld(e.offsetX,e.offsetY); cam.x+=w.x-w2.x; cam.y+=w.y-w2.y;
}, {passive:false});

// ---- side panel ----------------------------------------------------------
const panel=document.getElementById("panel");
const AT = { Position:["role","org","start","end","titleOfRecord"],
  Project:["description","lastActivity"], Skill:["level","category"],
  Person:["summary","email"], Category:["definition"],
  Certification:["issuer"], Education:["credential","issuer"] };
const KLABEL = { role:"Role", org:"Organization", start:"Start", end:"End",
  titleOfRecord:"Title of record", description:"Description", level:"Level",
  category:"Category", summary:"Summary", email:"Email", definition:"Definition",
  issuer:"Issuer", credential:"Credential", lastActivity:"Last activity" };
const REL = { usedSkill:"Skills used", broader:"Category", evidencedBy:"Evidence",
  certifies:"Certifies", org:"Organization", heldBy:"Held by",
  deliveredDuring:"Delivered during", recognizedBy:"Recognized by" };
const LEVELS = ["aware","working","proficient","expert"];
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function dot(t){ return `<span class="lg-dot" style="background:${typeColor[t]}"></span>`; }

// rg:level is ordinal, so render it as a rising 4-step bar; unknown values fall
// back to the plain literal rather than silently drawing an empty chart.
function levelHtml(v){
  const i = LEVELS.indexOf(String(v).toLowerCase());
  if (i < 0) return `<div class="v">${esc(v)}</div>`;
  const bars = LEVELS.map((_,j)=>`<i class="${j<=i?"on":""}"></i>`).join("");
  return `<div class="lvl">${bars}</div>
    <div class="lvl-cap"><span>${LEVELS[0]}</span><b>${esc(LEVELS[i])}</b><span>${LEVELS[3]}</span></div>`;
}

// 2024.67 → "2024-09". `last` is a decimal year so the window can do arithmetic
// on it; the panel has to hand it back in a form a reader recognises.
function fmtYear(y){
  const yr=Math.floor(y+1e-6), mo=Math.round((y-yr)*12)+1;
  return `${yr}-${String(mo).padStart(2,"0")}`;
}

function select(n){
  selected=n;
  if(!n){ panel.classList.remove("open"); return; }
  document.getElementById("p-type").innerHTML = dot(n.type)+n.type;
  document.getElementById("p-title").textContent = n.label;
  let h="";
  for(const k of (AT[n.type]||[])){ if(!n.attrs[k]) continue;
    const val = k==="level" ? levelHtml(n.attrs[k]) : `<div class="v">${esc(n.attrs[k])}</div>`;
    h+=`<div class="kv"><div class="k">${KLABEL[k]||k}</div>${val}</div>`; }
  // A skill's date is derived from its evidence, never asserted on the note —
  // label it so, and say "no evidence" rather than showing a blank for a stub.
  if(n.type==="Skill"){
    const at = n.ongoing ? "current" : (n.last!=null ? fmtYear(n.last) : "no evidence");
    h+=`<div class="kv"><div class="k">Last exercised</div><div class="v">${at}</div></div>`;
  }
  // prose excerpt (bullets on positions/projects)
  const bl=DATA.bullets[n.id];
  if(bl&&bl.length){ h+=`<div class="rel-group"><div class="rg-t"><span>Highlights</span></div><ul class="prose">${bl.map(b=>`<li>${esc(b)}</li>`).join("")}</ul></div>`; }
  // relationships grouped by kind
  const groups={};
  for(const e of adj.get(n.id)){ const key=e.kind; (groups[key]=groups[key]||[]).push(e.o); }
  const orderKinds=["usedSkill","broader","evidencedBy","certifies","org","heldBy","deliveredDuring","recognizedBy"];
  for(const k of orderKinds){ if(!groups[k]) continue;
    const chips=groups[k].map(o=>`<span class="chip" data-id="${esc(o.id)}">${dot(o.type)}${esc(o.label)}</span>`).join("");
    h+=`<div class="rel-group"><div class="rg-t"><span>${REL[k]||k}</span><span>${groups[k].length}</span></div>${chips}</div>`;
  }
  const body=document.getElementById("p-body"); body.innerHTML=h;
  body.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    const o=byId.get(c.dataset.id); if(o){ centerOn(o); select(o); }
  }));
  panel.classList.add("open");
}
document.getElementById("p-close").addEventListener("click",()=>select(null));
function centerOn(n){ cam.x=n.x; cam.y=n.y; cam.k=Math.max(cam.k,1.3); }

// ---- sidebar: type filter ------------------------------------------------
const total={}; DATA.nodes.forEach(n=>total[n.type]=(total[n.type]||0)+1);
const rows=document.getElementById("lg-rows");
const rowEls=new Map();
DATA.types.forEach(t=>{ if(!total[t.type]) return;
  const el=document.createElement("div"); el.className="lg-row"; el.dataset.type=t.type;
  el.innerHTML=`<span class="lg-dot" style="background:${t.color}"></span>${t.legend}<span class="lg-n">${total[t.type]}</span>`;
  el.addEventListener("click",()=>{
    if(hidden.has(t.type)){hidden.delete(t.type);el.classList.remove("off");}
    else{hidden.add(t.type);el.classList.add("off");}
    applyDateFilter();   // the empty-category cascade depends on the type filter
  });
  rowEls.set(t.type, el);
  rows.appendChild(el);
});
document.getElementById("lg-all").addEventListener("click",()=>{
  hidden.clear(); rowEls.forEach(el=>el.classList.remove("off")); applyDateFilter();
});

// Counts track what is actually on screen, so the window's bite is legible
// without hunting for it on the canvas.
function refreshCounts(){
  const live={};
  DATA.nodes.forEach(n=>{ if(!dateHidden.has(n.id) && !lvlHidden(n)) live[n.type]=(live[n.type]||0)+1; });
  rowEls.forEach((el,t)=>{ el.querySelector(".lg-n").textContent = live[t]||0; });
}

// ---- sidebar: date window + size key -------------------------------------
const dtRows=document.getElementById("dt-rows");
WINDOWS.forEach(w=>{
  const el=document.createElement("div");
  el.className="lg-row dt-row"+(w.years===windowYears?" on":"");
  el.innerHTML=`<span class="dt-mark"></span>${w.label}`;
  el.addEventListener("click",()=>{
    windowYears=w.years; applyDateFilter();
    dtRows.querySelectorAll(".dt-row").forEach(o=>o.classList.remove("on"));
    el.classList.add("on");
  });
  dtRows.appendChild(el);
});
// Level key = legend + filter. Labels are clipped to fit a 216px rail at the
// widest case (5 cells, when a projection's demanded stubs put "none" on the
// scale); the title carries the full word plus the bucket's size. A level-less
// skill with no "unrated" cell maps to a key nothing can toggle, so it simply
// stays visible — the absent cell filters nothing rather than hiding silently.
const LEVEL_LABEL={unrated:"none",aware:"aware",working:"work",proficient:"prof",expert:"expert"};
const szKey=document.getElementById("sz-key");
const szEls=[];
const lvlTotal={};
DATA.nodes.forEach(n=>{ if(n.type==="Skill"){ const k=levelOf(n); lvlTotal[k]=(lvlTotal[k]||0)+1; } });
DATA.levels.forEach(l=>{
  const el=document.createElement("div"); el.className="sz-cell";
  el.title=`${l.level} — ${lvlTotal[l.level]||0} skills`;
  el.innerHTML=`<span class="sz-dot"><i style="width:${l.size*2}px;height:${l.size*2}px"></i></span>`+
               `<span class="sz-lab">${LEVEL_LABEL[l.level]||l.level}</span>`;
  el.addEventListener("click",()=>{
    if(hiddenLevels.has(l.level)){ hiddenLevels.delete(l.level); el.classList.remove("off"); }
    else { hiddenLevels.add(l.level); el.classList.add("off"); }
    applyDateFilter();
  });
  szEls.push(el); szKey.appendChild(el);
});
document.getElementById("sz-all").addEventListener("click",()=>{
  hiddenLevels.clear(); szEls.forEach(el=>el.classList.remove("off")); applyDateFilter();
});
const sidebar=document.getElementById("sidebar");
document.getElementById("sb-toggle").addEventListener("click",()=>sidebar.classList.toggle("open"));

// ---- reset ---------------------------------------------------------------
document.getElementById("reset-btn").addEventListener("click",()=>{
  DATA.nodes.forEach(n=>{ n.x=(Math.random()-.5)*600; n.y=(Math.random()-.5)*600; n.vx=0; n.vy=0; });
  cam.x=0; cam.y=0; cam.k=0.9; alpha=1; select(null);
  if(REDUCED){ for(let i=0;i<400;i++) tick(); }
});

// ---- search --------------------------------------------------------------
document.getElementById("search").addEventListener("keydown",e=>{
  if(e.key!=="Enter") return; const q=e.target.value.trim().toLowerCase(); if(!q) return;
  const hit=DATA.nodes.find(n=>n.label.toLowerCase().includes(q));
  if(hit){ centerOn(hit); select(hit); }
});

resize(); applyDateFilter(); run();
</script>
</body>
</html>
